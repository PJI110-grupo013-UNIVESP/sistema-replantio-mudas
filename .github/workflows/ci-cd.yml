# .github/workflows/ci-cd.yml
name: Pipeline Univesp (CI/CD)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  testes-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: replantio_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Instalar dependências e Testar
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/replantio_db
        run: |
          cd backend
          pip install -r requirements.txt
          python -m pytest app/tests/

  testes-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
      - name: Instalar dependências e Testar
        run: |
          cd frontend
          npm install
          npx vitest run

